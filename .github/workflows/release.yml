name: Build and publish Windows release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: storyboard-grid-app-production-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_REPO: luojiang419/storyboard-grid-app-releases
  MINIMUM_VERSION: v1.0.0.97

jobs:
  release:
    name: Test, build, verify, and publish
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout full source history
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'

      - name: Resolve next release version and idempotency
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:GH_TOKEN) {
            throw 'RELEASE_REPO_TOKEN is not configured.'
          }
          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = "Bearer $env:GH_TOKEN"
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent' = 'StoryboardGridAppReleaseWorkflow'
          }
          $api = "https://api.github.com/repos/$env:RELEASE_REPO"
          $releases = @(Invoke-RestMethod -Headers $headers -Uri "$api/releases?per_page=100")
          $marker = "source-sha:$env:GITHUB_SHA"
          $existing = @($releases | Where-Object {
            -not $_.draft -and $_.body -like "*$marker*"
          })
          if ($existing.Count -gt 0) {
            "skip=true" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
            "existing_tag=$($existing[0].tag_name)" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
            "existing_url=$($existing[0].html_url)" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
            exit 0
          }

          try {
            $latest = Invoke-RestMethod -Headers $headers -Uri "$api/releases/latest"
            $latestTag = $latest.tag_name
          } catch {
            if ($_.Exception.Response.StatusCode -eq 404) {
              $latestTag = ''
            } else {
              throw
            }
          }
          $next = python scripts/next_release_version.py --latest $latestTag --minimum $env:MINIMUM_VERSION
          if ($LASTEXITCODE -ne 0) {
            throw 'Version resolver failed.'
          }
          if ($next -notmatch '^(\d+)\.(\d+)\.(\d+)\.(\d+)$') {
            throw "Version resolver returned invalid output: $next"
          }
          "skip=false" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
          "version=$next" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
          "tag=v$next" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
          "build_name=$($Matches[1]).$($Matches[2]).$($Matches[3])" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
          "build_number=$($Matches[4])" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Set up Flutter 3.38.8
        if: steps.version.outputs.skip != 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.38.8'
          channel: stable
          cache: true

      - name: Verify version scripts and inject release version
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          python scripts/next_release_version.py --self-test
          python scripts/prepare_release.py --self-test
          python scripts/prepare_release.py --version '${{ steps.version.outputs.version }}'

      - name: Restore locked dependencies
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: flutter pub get

      - name: Static analysis
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: flutter analyze --no-pub

      - name: Automated tests
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        env:
          CI: 'true'
        run: flutter test --no-pub

      - name: Build Windows release
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: >-
          flutter build windows --release --no-pub
          --build-name '${{ steps.version.outputs.build_name }}'
          --build-number '${{ steps.version.outputs.build_number }}'

      - name: Install Inno Setup 6.7.1
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress --yes

      - name: Build installer
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: ISCC.exe installer/storyboard_grid_app.iss

      - name: Verify installer contract
        if: steps.version.outputs.skip != 'true'
        id: artifact
        shell: pwsh
        run: >-
          ./scripts/verify_release_artifact.ps1
          -Version '${{ steps.version.outputs.version }}'

      - name: Create draft, upload, verify, and publish
        if: steps.version.outputs.skip != 'true'
        id: publish
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: >-
          ./scripts/publish_release.ps1
          -ReleaseRepo '${{ env.RELEASE_REPO }}'
          -Version '${{ steps.version.outputs.version }}'
          -SourceRepo '${{ github.repository }}'
          -SourceSha '${{ github.sha }}'
          -AssetPath '${{ steps.artifact.outputs.asset_path }}'
          -ChecksumPath '${{ steps.artifact.outputs.checksum_path }}'
          -ReleaseNotesPath './release-notes/current.md'
          -SignatureStatus '${{ steps.artifact.outputs.signature_status }}'

      - name: Idempotent release summary
        if: steps.version.outputs.skip == 'true'
        shell: pwsh
        run: |
          Write-Host "Source commit already published as ${{ steps.version.outputs.existing_tag }}"
          Write-Host "${{ steps.version.outputs.existing_url }}"
